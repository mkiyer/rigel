# Benchmark re-run after locus-span bug fix (merged-interval gDNA footprint)
#
# Reuses pre-existing BAM files from benchmark_output_v2 to test only
# the Rigel quantification with the fixed code. Salmon/kallisto/htseq
# are disabled since their results don't change.

genome: /Users/mkiyer/Downloads/rigel_runs/refs/human/genome_controls.fasta.bgz
gtf: /Users/mkiyer/Downloads/rigel_runs/refs/human/genes_controls.gtf.gz
outdir: /Users/mkiyer/Downloads/rigel_runs/benchmark_output_v3_locus_span_fix

threads: 8
transcript_filter: basic

sim_dir: /Users/mkiyer/Downloads/rigel_runs/sim_ccle_hela_cervix_short

aligners:
  oracle:
    type: oracle
  minimap2:
    type: minimap2

# Reuse pre-built minimap2 assets from v2
minimap2:
  index: /Users/mkiyer/Downloads/rigel_runs/benchmark_output_v2/genome.mmi
  bed: /Users/mkiyer/Downloads/rigel_runs/benchmark_output_v2/minimap2_annotation.bed

rigel_configs:
  default: {}

# Disable other tools — they don't use locus-span so results are unchanged
salmon:
  enabled: false
kallisto:
  enabled: false
htseq:
  enabled: false

runtime:
  keep_going: true

verbose: true
