# ╔═════════════════════════════════════════════════════════════╗
# ║  Simulation: HeLa/Cervix salmon TPM abundances             ║
# ╚═════════════════════════════════════════════════════════════╝
#
# Usage:
#   python scripts/sim.py --config scripts/sim_ccle_hela_salmon.yaml

# ── Inputs ────────────────────────────────────────────────────
genome: /Users/mkiyer/Downloads/rigel_runs/refs/human/genome_controls.fasta.bgz
gtf: /Users/mkiyer/Downloads/rigel_runs/refs/human/genes_controls.gtf.gz
outdir: /Users/mkiyer/Downloads/rigel_runs/sim_ccle_hela_salmon

# ── Transcript filter ─────────────────────────────────────────
transcript_filter: basic

# ── Simulation parameters ─────────────────────────────────────
simulation:
  n_rna_fragments: 10_000_000
  sim_seed: 42
  frag_mean: 300
  frag_std: 50
  frag_min: 50
  frag_max: 1000
  read_length: 150
  error_rate: 0.0

# ── Abundance model ───────────────────────────────────────────
abundance:
  mode: file
  seed: 42
  file: /Users/mkiyer/Downloads/rigel_runs/salmon_runs/ccle_hela_cervix/quant.sf.gz

# ── gDNA contamination ────────────────────────────────────────
gdna:
  rates: [0.0, 0.2, 0.5]
  rate_labels: [none, low, high]
  # Same fragment length distribution as RNA
  frag_mean: 300
  frag_std: 50
  frag_min: 50
  frag_max: 1000

# ── Strand specificity ───────────────────────────────────────
strand_specificities: [0.5, 0.9, 1.0]

# ── Nascent RNA spike-in sweep ────────────────────────────────
nrna:
  fracs:
    - [0.0, 0.5]
  frac_labels: [default]

# ── Oracle BAM ────────────────────────────────────────────────
oracle_bam: true

verbose: true
