# ╔═════════════════════════════════════════════════════════════╗
# ║  Benchmark v4: HeLa/Cervix salmon TPM simulation baseline  ║
# ╚═════════════════════════════════════════════════════════════╝
#
# Usage:
#   python scripts/benchmark.py --config scripts/benchmark_v4.yaml

# ── Inputs ────────────────────────────────────────────────────
genome: /Users/mkiyer/Downloads/rigel_runs/refs/human/genome_controls.fasta.bgz
gtf: /Users/mkiyer/Downloads/rigel_runs/refs/human/genes_controls.gtf.gz
outdir: /Users/mkiyer/Downloads/rigel_runs/benchmark_output_v4

threads: 8
transcript_filter: basic

# ── Data source ───────────────────────────────────────────────
sim_dir: /Users/mkiyer/Downloads/rigel_runs/sim_ccle_hela_salmon

# ── Aligners ──────────────────────────────────────────────────
aligners:
  oracle:
    type: oracle
  minimap2:
    type: minimap2

# ── Rigel configurations ─────────────────────────────────────
rigel_configs:
  default: {}

# ── Optional tools ────────────────────────────────────────────
salmon:
  enabled: false

kallisto:
  enabled: false

htseq:
  enabled: false

# ── Runtime ───────────────────────────────────────────────────
runtime:
  keep_going: true

verbose: true
