# locus_simple_strand.yaml — Strand specificity sensitivity
#
# Goal: Evaluate how strand_specificity (library prep quality) affects
#       quantification accuracy across varying abundances and gDNA levels.
# Grid: 2 TA1 × 2 nRNA × 3 gdna_frac × 4 ss = 48 runs

genome_length: 50000
seed: 42
read_length: 150

rna:
  frag_mean: 250
  frag_std: 50
  frag_min: 80
  frag_max: 600

gdna:
  frag_mean: 250
  frag_std: 50
  frag_min: 80
  frag_max: 600

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 1020], [5000, 5500], [12000, 13000]]
  TD:
    strand: "+"
    exons: [[28000, 29000]]
  TE:
    strand: "-"
    exons: [[40000, 41000], [45000, 46000]]

nrnas:
  NTA1: ["+", 1000, 13000]
  NTD: ["+", 28000, 29000]
  NTE: ["-", 40000, 46000]

sweep:
  strand_specificity: [0.5, 0.75, 0.9, 1.0]
  n_rna_fragments: 10000
  gdna_fraction: [0.0, 0.5, 2.0]

  TA1: [100, 500]
  NTA1: [0, 200]

  TD: 0
  TE: 0
