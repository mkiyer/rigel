# complex_locus_config.yaml — complex locus ablation study
#
# Goals:
#   1. FL distributions EQUAL for DNA/RNA (isolate other issues)
#   2. Fix total RNA fragments, add gDNA on top (gdna_fraction mode)
#   3. Expose mRNA, nRNA, gDNA accuracy issues
#   4. Test complex locus structures: overlapping isoforms, antisense,
#      convergent transcription, single-exon genes
#
# Grid: 16 patterns × 4 nRNA × 4 SS × 4 gdna_frac = 1024 runs

genome_length: 50000
seed: 42
read_length: 150

# ── Fragment length: EQUAL for RNA and gDNA ──────────────────────────
rna:
  frag_mean: 250
  frag_std: 50
  frag_min: 80
  frag_max: 600

gdna:
  frag_mean: 250
  frag_std: 50
  frag_min: 80
  frag_max: 600

# ── Transcript structures ────────────────────────────────────────────
transcripts:
  # Gene A locus (+strand): 4 overlapping isoforms sharing exons
  TA1:
    strand: "+"
    exons: [[1000, 1020], [5000, 5500], [12000, 13000]]

  # Gene D: single-exon gene (no introns → nRNA indistinguishable)
  TD:
    strand: "+"
    exons: [[28000, 29000]]

  # Gene E: isolated 2-exon gene on - strand (negative control)
  TE:
    strand: "-"
    exons: [[40000, 41000], [45000, 46000]]

# ── Nascent RNA groups ───────────────────────────────────────────────
nrnas:
  NTA1: ["+", 1000, 13000]
  NTD: ["+", 28000, 29000]
  NTE: ["-", 40000, 46000]

# ── Sweep grid ───────────────────────────────────────────────────────
# Uses n_rna_fragments mode: fix RNA at 10000, add gDNA on top
sweep:
  strand_specificity: [0.5, 0.9, 1.0]
  n_rna_fragments: 10000
  gdna_fraction: [0.0, 0.3, 1.0, 2.0]

  TA1: [0, 20, 100, 500]
  NTA1: [0, 20, 100, 500]

  # Unexpressed controls: always 0
  TD: 0
  TE: 0
