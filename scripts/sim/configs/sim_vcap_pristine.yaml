# ╔═════════════════════════════════════════════════════════════╗
# ║  VCaP Pristine: No gDNA, no nRNA — pure mRNA             ║
# ╚═════════════════════════════════════════════════════════════╝
#
# Usage:
#   python scripts/sim/sim.py --config scripts/sim/configs/sim_vcap_pristine.yaml

# ── Inputs ────────────────────────────────────────────────────
genome: /scratch/mkiyer_root/mkiyer0/shared_data/hulkrna/refs/human/genome_controls.fasta.bgz
gtf: /scratch/mkiyer_root/mkiyer0/shared_data/hulkrna/refs/human/genes_controls.gtf.gz
outdir: /scratch/mkiyer_root/mkiyer0/shared_data/rigel_benchmarks/ccle_vcap_pristine

# ── Transcript filter ─────────────────────────────────────────
transcript_filter: all

# ── Simulation parameters ─────────────────────────────────────
simulation:
  n_rna_fragments: 50_000_000
  sim_seed: 42
  frag_mean: 250
  frag_std: 50
  frag_min: 50
  frag_max: 1000
  read_length: 101
  error_rate: 0.0

# ── Abundance model ───────────────────────────────────────────
abundance:
  mode: file
  seed: 42
  file: /scratch/mkiyer_root/mkiyer0/shared_data/hulkrna/runs/human/ccle_vcap_prostate/salmon/quant.sf.gz

# ── gDNA contamination ────────────────────────────────────────
gdna:
  rates: [0.0]
  rate_labels: [none]
  frag_mean: 250
  frag_std: 100
  frag_min: 100
  frag_max: 1000

# ── Strand specificity ───────────────────────────────────────
strand_specificities: [0.9]

# ── Nascent RNA spike-in sweep ────────────────────────────────
nrna:
  fracs:
    - [0.0, 0.0]
  frac_labels: [none]

# ── Oracle BAM ────────────────────────────────────────────────
oracle_bam: true

verbose: true
