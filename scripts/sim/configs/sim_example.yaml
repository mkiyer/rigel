# ╔═════════════════════════════════════════════════════════════╗
# ║  Whole-Genome RNA-seq Simulator Configuration              ║
# ╚═════════════════════════════════════════════════════════════╝
#
# Usage:
#   python scripts/sim.py --config scripts/sim_example.yaml
#
# CLI flags (--genome, --gtf, --outdir, --n-rna, --no-oracle) override YAML.

# ── Inputs ────────────────────────────────────────────────────
genome: /path/to/genome.fa              # Indexed FASTA (samtools faidx)
gtf: /path/to/gencode.v46.annotation.gtf
outdir: sim_output

# ── Transcript filter ─────────────────────────────────────────
# Options: all, basic, mane, ccds
# "basic" recommended for reasonable runtimes (~100K transcripts)
transcript_filter: basic

# ── Simulation parameters ─────────────────────────────────────
simulation:
  # Fixed RNA fragment count (mRNA + nRNA combined).
  # gDNA fragments are added on top, keeping RNA depth constant.
  n_rna_fragments: 1_000_000

  sim_seed: 42

  # RNA fragment size distribution (truncated normal)
  frag_mean: 250
  frag_std: 50
  frag_min: 50
  frag_max: 1000

  read_length: 150
  error_rate: 0.0       # Per-base substitution rate (0 = perfect)

# ── Abundance model ───────────────────────────────────────────
abundance:
  mode: random          # "random" or "file"
  seed: 42

  # For mode: random — log-uniform sampling:
  #   log_total ~ Uniform(log(min), log(max))
  #   total = exp(log_total)
  min: 0.1
  max: 10000.0
  frac_expressed: 0.6   # Fraction of transcripts that are expressed

  # For mode: file (uncomment and set path):
  # file: /path/to/abundances.tsv
  #
  # Auto-detected formats:
  #   salmon quant.sf       — columns: Name, TPM
  #   kallisto abundance.tsv — columns: target_id, tpm
  #   sim TSV               — columns: transcript_id, mrna_abundance [, nrna_abundance]
  #
  # When the file provides nrna_abundance, those values are used as-is
  # and the nrna.fracs sweep is skipped.  Otherwise nrna.fracs controls
  # the spike-in.

# ── gDNA contamination ────────────────────────────────────────
# n_gdna = round(rate × n_rna_fragments), added on top of RNA.
# rate=0.2 with 1M RNA → 200K gDNA → 1.2M total fragments.
gdna:
  rates: [0.0, 0.2]
  rate_labels: [none, high]

  # gDNA fragment size distribution (typically larger than RNA)
  frag_mean: 350
  frag_std: 100
  frag_min: 100
  frag_max: 1000

# ── Strand specificity ───────────────────────────────────────
# 1.0 = perfectly strand-specific, 0.5 = unstranded
strand_specificities: [1.0, 0.9]

# ── Nascent RNA spike-in sweep ────────────────────────────────
# Each entry is [min, max] for Uniform(min, max) nRNA fraction.
# Per transcript:
#   nrna_frac ~ Uniform(min, max)
#   mRNA = total × (1 − nrna_frac)
#   nRNA = total × nrna_frac
# Single-exon transcripts always get nRNA = 0.
#
# Only applies when the abundance source does not provide explicit
# nRNA data (i.e. mode=random, or mode=file with salmon/kallisto).
# When a sim TSV with nrna_abundance is used, these are ignored.
nrna:
  fracs:
    - [0.0, 0.5]         # default nRNA range
  # frac_labels: [default]   # optional human-readable labels

# ── Oracle BAM ────────────────────────────────────────────────
# Generate oracle BAM (perfectly aligned) for each condition.
# Used by benchmark.py for the "oracle" aligner.
oracle_bam: true

verbose: true
