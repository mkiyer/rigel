# ╔═════════════════════════════════════════════════════════════╗
# ║  Benchmark v6: rigel (prune ON vs OFF) + salmon + kallisto ║
# ╚═════════════════════════════════════════════════════════════╝
#
# Two rigel configs:
#   - "default"  → prune_threshold=0.1 (production default)
#   - "no_prune" → prune_threshold=-1.0 (disabled)
#
# Usage:
#   python scripts/benchmark.py --config scripts/benchmark_v6_prune.yaml

# ── Inputs ────────────────────────────────────────────────────
genome: /Users/mkiyer/Downloads/rigel_runs/refs/human/genome_controls.fasta.bgz
gtf: /Users/mkiyer/Downloads/rigel_runs/refs/human/genes_controls.gtf.gz
outdir: /Users/mkiyer/Downloads/rigel_runs/benchmark_output_v6_prune

threads: 8
transcript_filter: basic

# ── Data source ───────────────────────────────────────────────
sim_dir: /Users/mkiyer/Downloads/rigel_runs/sim_ccle_hela_salmon

# ── Aligners ──────────────────────────────────────────────────
aligners:
  oracle:
    type: oracle
  minimap2:
    type: minimap2

# ── Rigel configurations ─────────────────────────────────────
rigel_configs:
  default: {}

# ── External tools ────────────────────────────────────────────
salmon:
  enabled: true

kallisto:
  enabled: true

htseq:
  enabled: false

# ── Runtime ───────────────────────────────────────────────────
runtime:
  keep_going: true

verbose: true
