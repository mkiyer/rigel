# ablation_comprehensive.yaml — Full factorial stress test
#
# Goal: identify remaining deconvolution failures across the full
# nRNA × gDNA × strand_specificity × kappa parameter space.
#
# Axes:
#   4 transcript patterns (one-hot TA1–TA4)
#   4 nRNA levels:  0, 10, 100, 1000
#   4 gDNA levels:  0, 10, 100, 1000
#   3 SS levels:    1.0, 0.95, 0.9
#   3 kappa levels: 2.0 (disabled), 4.0 (moderate), 6.0 (strong)
#
# Total: 4 × 4 × 4 × 3 × 3 = 576 runs
# At 50k fragments each, ~5–10 min total.

genome_length: 50000
seed: 42

sim:
  frag_mean: 200
  frag_std: 30
  frag_min: 80
  frag_max: 450
  read_length: 100

gdna_config:
  frag_mean: 350
  frag_std: 100
  frag_min: 100
  frag_max: 1000

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [7000, 7500], [9000, 10000]]
  TA2:
    strand: "+"
    exons: [[1000, 2000], [9000, 10000]]
  TA3:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [9000, 10000]]
  TA4:
    strand: "+"
    exons: [[4500, 5500], [9000, 10000]]
  TB:
    strand: "-"
    exons: [[20000, 24000]]
  TC:
    strand: "-"
    exons: [[30000, 31000], [35000, 36000]]

nrnas:
  NTA: ["+", 1000, 10000]

sweep:
  TB: 0
  TC: 0

  # nRNA: 4 levels covering zero → extreme
  NTA: [0, 10, 100, 1000]

  # gDNA: 4 levels covering zero → extreme
  gdna: [0, 10, 100, 1000]

  # Strand specificity: perfect, near-perfect, moderate
  strand_specificity: [1.0, 0.95, 0.9]

  # Penalty strength: disabled, moderate, strong

  # High fragment count to reduce sampling noise
  n_fragments: 50000

patterns:
  - {TA1: 100, TA2: 0, TA3: 0, TA4: 3}
  - {TA1: 0, TA2: 100, TA3: 0, TA4: 3}
  - {TA1: 0, TA2: 0, TA3: 100, TA4: 3}
  - {TA1: 0, TA2: 0, TA3: 0, TA4: 100}
