# locus_simple_em_prior.yaml — EM prior pseudocount sensitivity
#
# Goal: Evaluate how the OVR prior pseudocount affects quantification
#       accuracy across different gDNA contamination levels.
# Grid: 3 transcripts × 3 TA1 abundances × 3 nRNA × 4 gdna_frac × 4 prior = 144 runs

genome_length: 50000
seed: 42
read_length: 150

rna:
  frag_mean: 250
  frag_std: 50
  frag_min: 80
  frag_max: 600

gdna:
  frag_mean: 250
  frag_std: 50
  frag_min: 80
  frag_max: 600

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 1020], [5000, 5500], [12000, 13000]]
  TD:
    strand: "+"
    exons: [[28000, 29000]]
  TE:
    strand: "-"
    exons: [[40000, 41000], [45000, 46000]]

nrnas:
  NTA1: ["+", 1000, 13000]
  NTD: ["+", 28000, 29000]
  NTE: ["-", 40000, 46000]

sweep:
  strand_specificity: 0.9
  n_rna_fragments: 10000
  gdna_fraction: [0.0, 0.3, 1.0, 2.0]

  TA1: [50, 200, 1000]
  NTA1: [0, 50, 200]

  TD: 0
  TE: 0

params:
  em:
    prior_pseudocount: [0.1, 0.5, 1.0, 5.0]
