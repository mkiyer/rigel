# nrna_sweep_config.yaml — Nascent RNA stress-test configuration
#
# Scenario: 50 kb genome, 6 transcripts, 3 nRNA groups.
#
# Locus TA (+strand, 1000–10000): 4 alternative splice variants sharing
#   overlapping genomic spans.  This creates a complex nRNA/mRNA
#   deconvolution problem: nascent RNA reads from the locus must be
#   separated from mature mRNA reads of the correct isoform.
#
#   TA1: exons (1000,2000) (5000,5500) (7000,7500) (9000,10000)  [4 exons, span 9kb]
#   TA2: exons (1000,2000) (9000,10000)                          [2 exons, span 9kb]
#   TA3: exons (1000,2000) (5000,5500) (9000,10000)              [3 exons, span 9kb]
#   TA4: exons (4500,5500) (9000,10000)                          [2 exons, alt TSS, span 5.5kb]
#
# Negative controls (−strand, unexpressed):
#   TB:  exons (20000,24000)              [single-exon]
#   TC:  exons (30000,31000) (35000,36000) [two-exon]
#
# Entities in the model:
#   Transcripts:  TA1, TA2, TA3, TA4, TB, TC — each with mRNA abundance
#   nRNAs:        NTA at (sweep, +, 1000, 10000) covers TA1–TA4
#                 nrna_TB, nrna_TC auto-derived (default to 0)
#   gDNA:         single global contamination abundance
#
# Test tiers (generated by the 4×2×2 Cartesian product):
#   Tier 1 — Pristine:           one-hot mRNA, nRNA=0,   gDNA=0
#   Tier 2 — nRNA stress:        one-hot mRNA, nRNA=100, gDNA=0
#   Tier 3 — Full contamination: one-hot mRNA, nRNA=100, gDNA=100
#   Bonus  — gDNA-only:          one-hot mRNA, nRNA=0,   gDNA=100
#
# Total: 4 patterns × 2 nRNA × 2 gDNA = 16 runs.

genome_length: 50000
seed: 42

# ── Read simulation parameters ───────────────────────────────────────
sim:
  frag_mean: 200
  frag_std: 30
  frag_min: 80
  frag_max: 450
  read_length: 100

# ── gDNA fragment parameters (used when gdna > 0) ───────────────────
gdna_config:
  frag_mean: 350
  frag_std: 100
  frag_min: 100
  frag_max: 1000

# ── Transcript structures ────────────────────────────────────────────
# Each transcript is defined by strand and exon coordinates (0-based
# half-open).  There is no gene concept here — nRNA groups link
# transcripts that share a nascent RNA source.

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [7000, 7500], [9000, 10000]]
  TA2:
    strand: "+"
    exons: [[1000, 2000], [9000, 10000]]
  TA3:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [9000, 10000]]
  TA4:
    strand: "+"
    exons: [[4500, 5500], [9000, 10000]]
  TB:
    strand: "-"
    exons: [[20000, 24000]]
  TC:
    strand: "-"
    exons: [[30000, 31000], [35000, 36000]]

# ── Nascent RNA definitions ──────────────────────────────────────────
# Each nRNA is defined by its genomic coordinates [ref, strand, start, end],
# matching Rigel's internal (ref, strand, start, end) nRNA model.
# Transcripts whose genomic span falls within these coordinates are
# automatically assigned to that nRNA group.  The group's nRNA abundance
# is assigned to the widest-span multi-exon transcript (the "carrier");
# other transcripts in the group get nrna_abundance=0.
#
# Transcripts not covered by any nRNA entry are auto-grouped by
# overlapping genomic spans on the same strand.  Since TB and TC
# don't overlap NTA, they get auto-derived groups (nrna_TB, nrna_TC)
# defaulting to 0.

nrnas:
  NTA: ["sweep", "+", 1000, 10000]

# ── Sweep grid ───────────────────────────────────────────────────────
# Each entity is an independent sweep dimension.
# Values: constant (100), list ([0, 100]), or sweep ({start, stop, step}).
# All dimensions form a Cartesian product.
# Entities not listed default to 0 (except strand_specificity=1.0,
# n_fragments=2000).

sweep:
  # Negative controls: always unexpressed
  TB: 0
  TC: 0

  # Nascent RNA abundance for the TA locus.
  # The carrier (TA1, widest span) receives this value.
  NTA: [0, 100]

  # Genomic DNA contamination abundance
  gdna: [0, 100]

  # Strand specificity (1.0 = perfect stranded library)
  strand_specificity: 1.0

  # Total fragments per simulation run
  n_fragments: 10000

# ── Correlated patterns ──────────────────────────────────────────────
# Each entry groups correlated parameters swept together as one
# dimension.  Entities in patterns are excluded from the independent
# sweep product.  Total runs = len(patterns) × product(sweep dims).
#
# One-hot transcript patterns: activate one TA transcript at a time.
# TA4 has a low baseline (3) in most patterns to test low-abundance
# detection alongside the dominant transcript.

patterns:
  - {TA1: 100, TA2: 0, TA3: 0, TA4: 3}
  - {TA1: 0, TA2: 100, TA3: 0, TA4: 3}
  - {TA1: 0, TA2: 0, TA3: 100, TA4: 3}
  - {TA1: 0, TA2: 0, TA3: 0, TA4: 100}
