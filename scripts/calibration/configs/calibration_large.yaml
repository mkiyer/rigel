# Genome: 2 Mb, 60 expressed + 40 unexpressed transcripts
# Grid: 1 pattern × 5 gdna_frac × 4 SS × 3 kappa × 2 gdna_fl = 120 runs
# (minus degenerate: ~116 effective runs)
#
# Validates:
#   - Purity-score seed selection across region types
#   - Frozen density estimation
#   - κ recovery at various overdispersion levels
#   - FL model recovery with similar vs different gDNA FL
#   - Robustness from unstranded (0.5) to stranded (0.95)
#

