# calibration_stress_test.yaml — Stress test: equal FL distributions
#
# Purpose: Validate calibration with IDENTICAL fragment-length distributions
#          for RNA and gDNA so that FL provides zero discriminatory signal.
#          This isolates strand and density signals for calibration.
#
# Key constraints:
#   - RNA and gDNA FL distributions are IDENTICAL (frag_mean=250, frag_std=50)
#   - SS=1.0 should yield near-perfect calibration (strand signal alone)
#   - SS=0.5 should still work via density + splice signals
#
# Grid: 1 pattern × 4 SS × 4 gdna_fraction × 4 kappa = 64 runs
#        (16 runs have gdna_fraction=0 → trivially skip calibration)
#        → 48 meaningful runs

genome_length: 500000
seed: 42
read_length: 150

# ── Fragment length: IDENTICAL for RNA and gDNA ─────────────────────
rna:
  frag_mean: 250
  frag_std: 50
  frag_min: 80
  frag_max: 600

gdna:
  frag_mean: 250
  frag_std: 50
  frag_min: 80
  frag_max: 600

