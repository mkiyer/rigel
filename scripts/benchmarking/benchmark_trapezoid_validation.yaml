aligners:
  oracle: {}

# ── Trapezoid validation: 3 conditions × 4 alpha values ────────
#
# Condition 1: trapezoid bias model, NO warm-start, NO OVR (gamma=0)
#   → Positional info is in likelihood via trapezoid coverage profile.
#     Coverage weights = 1.0; OVR disabled.
#
# Condition 2: uniform bias model, NO warm-start, NO OVR (gamma=0)
#   → Baseline: no positional correction anywhere.
#     Coverage weights still computed but OVR prior disabled.
#
# Condition 3: uniform bias model, WITH warm-start + OVR (gamma=1)
#   → Previous behavior: coverage-weighted warm start + OVR prior.
#
# Alpha sweep: 1e-3, 1e-2, 0.1, 1.0

hulkrna_configs:
  # ── Condition 1: trapezoid, no OVR ──
  trap_a1e3:
    bias_model: trapezoid
    em_prior_alpha: 1.0e-3
    em_prior_gamma: 0.0
  trap_a1e2:
    bias_model: trapezoid
    em_prior_alpha: 1.0e-2
    em_prior_gamma: 0.0
  trap_a1e1:
    bias_model: trapezoid
    em_prior_alpha: 0.1
    em_prior_gamma: 0.0
  trap_a1e0:
    bias_model: trapezoid
    em_prior_alpha: 1.0
    em_prior_gamma: 0.0

  # ── Condition 2: uniform, no OVR ──
  unif_a1e3:
    bias_model: uniform
    em_prior_alpha: 1.0e-3
    em_prior_gamma: 0.0
  unif_a1e2:
    bias_model: uniform
    em_prior_alpha: 1.0e-2
    em_prior_gamma: 0.0
  unif_a1e1:
    bias_model: uniform
    em_prior_alpha: 0.1
    em_prior_gamma: 0.0
  unif_a1e0:
    bias_model: uniform
    em_prior_alpha: 1.0
    em_prior_gamma: 0.0

  # ── Condition 3: uniform + OVR (previous behavior) ──
  ovr_a1e3:
    bias_model: uniform
    em_prior_alpha: 1.0e-3
    em_prior_gamma: 1.0
  ovr_a1e2:
    bias_model: uniform
    em_prior_alpha: 1.0e-2
    em_prior_gamma: 1.0
  ovr_a1e1:
    bias_model: uniform
    em_prior_alpha: 0.1
    em_prior_gamma: 1.0
  ovr_a1e0:
    bias_model: uniform
    em_prior_alpha: 1.0
    em_prior_gamma: 1.0

