# ablation_mrna_dynamic_range.yaml — mRNA dynamic range test
#
# Tests how mRNA accuracy scales with expression level.
# Fixed: NTA=100, gDNA=100, SS=1.0, 100k fragments
# Sweep: TA1 from 1 to 10000 (spanning 4 orders of magnitude)
#        TA4=3 is a fixed low-abundance internal control
#        kappa: 2.0 (disabled) and 6.0 (targeted penalty)
#
# Key question: does high mRNA expression "protect" against
# gDNA siphoning, and can the model detect a 1-copy transcript
# against 100 gDNA + 100 nRNA background?
#
# Total: 9 TA1 × 2 kappa = 18 runs

genome_length: 50000
seed: 42

sim:
  frag_mean: 200
  frag_std: 30
  frag_min: 80
  frag_max: 450
  read_length: 100

gdna_config:
  frag_mean: 350
  frag_std: 100
  frag_min: 100
  frag_max: 1000

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [7000, 7500], [9000, 10000]]
  TA2:
    strand: "+"
    exons: [[1000, 2000], [9000, 10000]]
  TA3:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [9000, 10000]]
  TA4:
    strand: "+"
    exons: [[4500, 5500], [9000, 10000]]
  TB:
    strand: "-"
    exons: [[20000, 24000]]
  TC:
    strand: "-"
    exons: [[30000, 31000], [35000, 36000]]

nrnas:
  NTA: ["+", 1000, 10000]

sweep:
  TA1: [1, 3, 10, 30, 100, 300, 1000, 3000, 10000]
  TA2: 0
  TA3: 0
  TA4: 3
  TB: 0
  TC: 0
  NTA: 100
  gdna: 100
  strand_specificity: 1.0
  n_fragments: 100000
