# diag_ss_sweep.yaml — Strand specificity vs gDNA siphoning
#
# Fixed: TA1=100, nRNA=100, gDNA=100, 10k fragments
# Sweep: strand_specificity from 0.75 to 1.0
#
# Purpose: test hypothesis H5 — per-fragment strand discrimination
# weakens at lower SS. At SS=1.0, mRNA has a ×2.0 likelihood
# advantage over gDNA per sense fragment. At SS=0.8, only ×1.6.
# Expected: siphoning worsens at lower SS.
#
# Total runs: 6

genome_length: 50000
seed: 42

sim:
  frag_mean: 200
  frag_std: 30
  frag_min: 80
  frag_max: 450
  read_length: 100

gdna_config:
  frag_mean: 350
  frag_std: 100
  frag_min: 100
  frag_max: 1000

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [7000, 7500], [9000, 10000]]
  TA2:
    strand: "+"
    exons: [[1000, 2000], [9000, 10000]]
  TA3:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [9000, 10000]]
  TA4:
    strand: "+"
    exons: [[4500, 5500], [9000, 10000]]
  TB:
    strand: "-"
    exons: [[20000, 24000]]
  TC:
    strand: "-"
    exons: [[30000, 31000], [35000, 36000]]

nrnas:
  NTA: ["+", 1000, 10000]

sweep:
  TA1: 100
  TA2: 0
  TA3: 0
  TA4: 0
  TB: 0
  TC: 0
  NTA: 100
  gdna: 100
  strand_specificity: [0.75, 0.85, 0.9, 0.95, 0.99, 1.0]
  n_fragments: 10000
