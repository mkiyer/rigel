# gdna_fix_baseline_comparison.yaml — Before/after comparison for gDNA siphoning fix
#
# Compares strand_symmetry_kappa=2.0 (disabled, old behavior) vs 6.0 (default)
# across the full pattern × nRNA × gDNA grid.
#
# This is the nrna_sweep_config with kappa added as a sweep dimension.
# Purpose: demonstrate improvement from Phase 1 (density-based init) +
#          Phase 2 (soft Beta symmetry penalty, kappa=6 vs 2=disabled).
#
# Total runs: 4 patterns × 2 nRNA × 2 gDNA × 2 kappa = 32 runs

genome_length: 50000
seed: 42

sim:
  frag_mean: 200
  frag_std: 30
  frag_min: 80
  frag_max: 450
  read_length: 100

gdna_config:
  frag_mean: 350
  frag_std: 100
  frag_min: 100
  frag_max: 1000

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [7000, 7500], [9000, 10000]]
  TA2:
    strand: "+"
    exons: [[1000, 2000], [9000, 10000]]
  TA3:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [9000, 10000]]
  TA4:
    strand: "+"
    exons: [[4500, 5500], [9000, 10000]]
  TB:
    strand: "-"
    exons: [[20000, 24000]]
  TC:
    strand: "-"
    exons: [[30000, 31000], [35000, 36000]]

nrnas:
  NTA: ["+", 1000, 10000]

sweep:
  TB: 0
  TC: 0
  NTA: [0, 100]
  gdna: [0, 100]
  strand_specificity: 1.0
  n_fragments: 10000
  strand_symmetry_kappa: [2.0, 6.0]

patterns:
  - {TA1: 100, TA2: 0, TA3: 0, TA4: 3}
  - {TA1: 0, TA2: 100, TA3: 0, TA4: 3}
  - {TA1: 0, TA2: 0, TA3: 100, TA4: 3}
  - {TA1: 0, TA2: 0, TA3: 0, TA4: 100}
