# diag_gdna_titration.yaml — Isolate gDNA siphoning vs mRNA
#
# Fixed: TA1=100, nRNA=0, SS=1.0, 10k fragments
# Sweep: gDNA abundance from 0 to 500
#
# Purpose: measure how gDNA over-estimation scales with gDNA abundance.
# At SS=1.0, total gDNA ≈ 2×antisense, so the EM should be accurate.
# Any systematic mRNA under-estimation reveals the siphoning bug.
#
# Total runs: 6

genome_length: 50000
seed: 42

sim:
  frag_mean: 200
  frag_std: 30
  frag_min: 80
  frag_max: 450
  read_length: 100

gdna_config:
  frag_mean: 350
  frag_std: 100
  frag_min: 100
  frag_max: 1000

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [7000, 7500], [9000, 10000]]
  TA2:
    strand: "+"
    exons: [[1000, 2000], [9000, 10000]]
  TA3:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [9000, 10000]]
  TA4:
    strand: "+"
    exons: [[4500, 5500], [9000, 10000]]
  TB:
    strand: "-"
    exons: [[20000, 24000]]
  TC:
    strand: "-"
    exons: [[30000, 31000], [35000, 36000]]

nrnas:
  NTA: ["+", 1000, 10000]

sweep:
  TA1: 100
  TA2: 0
  TA3: 0
  TA4: 0
  TB: 0
  TC: 0
  NTA: 0
  gdna: [0, 25, 50, 100, 200, 500]
  strand_specificity: 1.0
  n_fragments: 10000
