# diag_prune_threshold.yaml — Pruning sensitivity for low-abundance transcripts
#
# Fixed: TA1=100, TA4=3, nRNA=100, gDNA=100, SS=1.0, 10k fragments
# Sweep: prune_threshold from 0.0 (disabled) to 0.2
#
# Purpose: test hypothesis H4 — low-abundance TA4 (~10-15 expected
# fragments) gets pruned when gDNA claims some of its fragments.
# At prune_threshold=0.0, TA4 should survive. At 0.1 (default),
# TA4 may be zeroed if its evidence ratio falls below threshold.
#
# Total runs: 5

genome_length: 50000
seed: 42

sim:
  frag_mean: 200
  frag_std: 30
  frag_min: 80
  frag_max: 450
  read_length: 100

gdna_config:
  frag_mean: 350
  frag_std: 100
  frag_min: 100
  frag_max: 1000

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [7000, 7500], [9000, 10000]]
  TA2:
    strand: "+"
    exons: [[1000, 2000], [9000, 10000]]
  TA3:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [9000, 10000]]
  TA4:
    strand: "+"
    exons: [[4500, 5500], [9000, 10000]]
  TB:
    strand: "-"
    exons: [[20000, 24000]]
  TC:
    strand: "-"
    exons: [[30000, 31000], [35000, 36000]]

nrnas:
  NTA: ["+", 1000, 10000]

sweep:
  TA1: 100
  TA2: 0
  TA3: 0
  TA4: 3
  TB: 0
  TC: 0
  NTA: 100
  gdna: 100
  strand_specificity: 1.0
  n_fragments: 10000
  prune_threshold: [0.0, 0.01, 0.05, 0.1, 0.2]
