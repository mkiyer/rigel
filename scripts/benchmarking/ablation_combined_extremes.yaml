# ablation_combined_extremes.yaml — Combined extreme stress test
#
# Tests the hardest corners: what happens when multiple components
# are simultaneously at extreme levels?
#
# Fixed: TA1=100, TA4=3, SS=1.0, kappa=6.0 (targeted penalty)
# Sweep: NTA × gDNA full matrix including extreme values
#        n_fragments scales with total abundance to maintain sampling
#
# Key questions:
#   - Does the model converge when gDNA=10000 AND nRNA=10000?
#   - Which component is most damaged by extreme levels of the others?
#   - Is there a "tipping point" where the model breaks down?
#
# Total: 6 NTA × 6 gDNA = 36 runs

genome_length: 50000
seed: 42

sim:
  frag_mean: 200
  frag_std: 30
  frag_min: 80
  frag_max: 450
  read_length: 100

gdna_config:
  frag_mean: 350
  frag_std: 100
  frag_min: 100
  frag_max: 1000

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [7000, 7500], [9000, 10000]]
  TA2:
    strand: "+"
    exons: [[1000, 2000], [9000, 10000]]
  TA3:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [9000, 10000]]
  TA4:
    strand: "+"
    exons: [[4500, 5500], [9000, 10000]]
  TB:
    strand: "-"
    exons: [[20000, 24000]]
  TC:
    strand: "-"
    exons: [[30000, 31000], [35000, 36000]]

nrnas:
  NTA: ["+", 1000, 10000]

sweep:
  TA1: 100
  TA2: 0
  TA3: 0
  TA4: 3
  TB: 0
  TC: 0
  NTA: [0, 10, 100, 1000, 5000, 10000]
  gdna: [0, 10, 100, 1000, 5000, 10000]
  strand_specificity: 1.0
  n_fragments: 200000
