# ── Phase D: OVR-only prior (ε + γ × OVR) ──────────────────────
# Compare MAP vs VBEM, both with the new pure-OVR prior.
# Historical Phase C baselines for reference:
#   MAP  α=0.01 : MAE 17.72, Spearman 0.8077, FP 110, Dropout 178
#   VBEM α=0.25 : MAE 18.26, Spearman 0.8111, FP  51, Dropout 237
hulkrna_configs:
  map_ovr:
    em_mode: map
    em_prior_gamma: 1.0
  vbem_ovr:
    em_mode: vbem
    em_prior_gamma: 1.0

simulation:
  n_fragments: 50000
  sim_seed: 101
  pipeline_seed: 101
  frag_mean: 250.0
  frag_std: 50.0
  frag_min: 50
  frag_max: 1000
  read_length: 150
  error_rate: 0.0

# 4 conditions: pristine, gDNA=r20, nRNA=r30, both
gdna:
  rates: [0.0, 0.2]
  rate_labels: [none, r20]
  frag_mean: 350.0
  frag_std: 100.0
  frag_min: 100
  frag_max: 1000

nrna:
  rates: [0.0, 0.3]
  rate_labels: [none, r30]

