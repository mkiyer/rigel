# gdna_robustness_sweep.yaml — Robustness test across conditions
#
# Tests the best kappa (from grid search) across varied conditions:
#   - gDNA levels: 0, 50, 100, 200, 500
#   - SS levels: 0.8, 0.9, 0.95, 1.0
#   - nRNA: 0, 100
#   - kappa: 2.0 (disabled), 3.0 (grid optimum), 6.0 (default)
#
# Fixed: TA1=100, TA4=3, 10k fragments
#
# Purpose: verify the fix is robust across:
#   - Different gDNA contamination levels
#   - Different library strand specificities
#   - With and without nascent RNA
#
# Total runs: 5 gDNA × 4 SS × 2 nRNA × 3 kappa = 120 runs

genome_length: 50000
seed: 42

sim:
  frag_mean: 200
  frag_std: 30
  frag_min: 80
  frag_max: 450
  read_length: 100

gdna_config:
  frag_mean: 350
  frag_std: 100
  frag_min: 100
  frag_max: 1000

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [7000, 7500], [9000, 10000]]
  TA2:
    strand: "+"
    exons: [[1000, 2000], [9000, 10000]]
  TA3:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [9000, 10000]]
  TA4:
    strand: "+"
    exons: [[4500, 5500], [9000, 10000]]
  TB:
    strand: "-"
    exons: [[20000, 24000]]
  TC:
    strand: "-"
    exons: [[30000, 31000], [35000, 36000]]

nrnas:
  NTA: ["+", 1000, 10000]

sweep:
  TA1: 100
  TA2: 0
  TA3: 0
  TA4: 3
  TB: 0
  TC: 0
  NTA: [0, 100]
  gdna: [0, 50, 100, 200, 500]
  strand_specificity: [0.8, 0.9, 0.95, 1.0]
  n_fragments: 10000
