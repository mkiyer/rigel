# diag_frag_count.yaml — Fragment count vs deconvolution accuracy
#
# Fixed: TA1=100, nRNA=100, gDNA=100, SS=1.0
# Sweep: n_fragments from 1000 to 50000
#
# Purpose: test hypothesis H6 — whether the EM needs more data
# to properly separate gDNA from mRNA in the unspliced pool.
# If accuracy improves with more fragments, the issue is statistical
# power. If it plateaus, the issue is structural (model bias).
#
# Total runs: 5

genome_length: 50000
seed: 42

sim:
  frag_mean: 200
  frag_std: 30
  frag_min: 80
  frag_max: 450
  read_length: 100

gdna_config:
  frag_mean: 350
  frag_std: 100
  frag_min: 100
  frag_max: 1000

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [7000, 7500], [9000, 10000]]
  TA2:
    strand: "+"
    exons: [[1000, 2000], [9000, 10000]]
  TA3:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [9000, 10000]]
  TA4:
    strand: "+"
    exons: [[4500, 5500], [9000, 10000]]
  TB:
    strand: "-"
    exons: [[20000, 24000]]
  TC:
    strand: "-"
    exons: [[30000, 31000], [35000, 36000]]

nrnas:
  NTA: ["+", 1000, 10000]

sweep:
  TA1: 100
  TA2: 0
  TA3: 0
  TA4: 0
  TB: 0
  TC: 0
  NTA: 100
  gdna: 100
  strand_specificity: 1.0
  n_fragments: [1000, 2000, 5000, 10000, 50000]
