# gdna_kappa_pseudo_grid.yaml — Hyperparameter tuning grid for symmetry penalty
#
# Fixed scenario: TA1=100, TA4=3, NTA=100, gDNA=100, SS=1.0, 10k frags
# (This is the "full contamination" case where siphoning is worst.)
#
# Sweep:
#   strand_symmetry_kappa: [2.0, 3.0, 4.0, 6.0, 8.0, 10.0, 15.0, 20.0, 50.0]
#     - 2.0 = disabled (w_sym ≥ 1)
#     - 3-6 = mild penalty
#     - 8-20 = moderate penalty
#     - 50 = aggressive penalty
#   strand_symmetry_pseudo: removed (folded into SS-scaled κ_eff)
#
# Total runs: 9 kappa runs

genome_length: 50000
seed: 42

sim:
  frag_mean: 200
  frag_std: 30
  frag_min: 80
  frag_max: 450
  read_length: 100

gdna_config:
  frag_mean: 350
  frag_std: 100
  frag_min: 100
  frag_max: 1000

transcripts:
  TA1:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [7000, 7500], [9000, 10000]]
  TA2:
    strand: "+"
    exons: [[1000, 2000], [9000, 10000]]
  TA3:
    strand: "+"
    exons: [[1000, 2000], [5000, 5500], [9000, 10000]]
  TA4:
    strand: "+"
    exons: [[4500, 5500], [9000, 10000]]
  TB:
    strand: "-"
    exons: [[20000, 24000]]
  TC:
    strand: "-"
    exons: [[30000, 31000], [35000, 36000]]

nrnas:
  NTA: ["+", 1000, 10000]

sweep:
  TA1: 100
  TA2: 0
  TA3: 0
  TA4: 3
  TB: 0
  TC: 0
  NTA: 100
  gdna: 100
  strand_specificity: 1.0
  n_fragments: 10000
  strand_symmetry_kappa: [2.0, 3.0, 4.0, 6.0, 8.0, 10.0, 15.0, 20.0, 50.0]
