genome: /Users/mkiyer/Downloads/hulkrna_runs/refs/human/genome_controls.fasta.bgz
gtf: /Users/mkiyer/Downloads/hulkrna_runs/refs/human/genes_controls.gtf.gz
outdir: /Users/mkiyer/Downloads/hulkrna_runs/bench_vbem_comprehensive
threads: 8

# Focus on the two regions with the most false positives (41 isoforms each).
region:
  - FGFR2: chr10:121476640-121601584
  - BRCA1: chr17:43044295-43170245

# Oracle aligner to isolate EM algorithm differences.
aligners:
  oracle: {}

# Compare MAP (current default) vs VBEM (opt-in).
hulkrna_configs:
  map:
    em_mode: map
  vbem:
    em_mode: vbem

simulation:
  n_fragments: 50000
  sim_seed: 101
  pipeline_seed: 101
  frag_mean: 250.0
  frag_std: 50.0
  frag_min: 50
  frag_max: 1000
  read_length: 150
  error_rate: 0.0

# Comprehensive gDNA sweep: pristine, moderate, heavy.
gdna:
  rates: [0.0, 0.2, 1.0]
  rate_labels: [none, r20, r100]
  frag_mean: 350.0
  frag_std: 100.0
  frag_min: 100
  frag_max: 1000

# nRNA sweep: off and moderate.
nrna:
  rates: [0.0, 0.3]
  rate_labels: [none, r30]

# Strand specificity: perfect and slightly degraded.
strand_specificities: [1.0, 0.9]

abundance:
  mode: random
  seed: 101
  min: 0.01
  max: 100000.0

htseq:
  enabled: false

runtime:
  keep_going: true

verbose: true
