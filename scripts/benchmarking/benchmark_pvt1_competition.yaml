# Benchmark: chr8 PVT1 / MYC locus — competition config
# rigel vs salmon vs kallisto
# Tests accuracy under pristine, gDNA, and nRNA conditions

genome: /Users/mkiyer/Downloads/rigel_runs/refs/human/genome_controls.fasta.bgz
gtf: /Users/mkiyer/Downloads/rigel_runs/refs/human/genes_controls.gtf.gz
outdir: /Users/mkiyer/Downloads/rigel_runs/bench_pvt1_competition

threads: 8

# ── Region ───────────────────────────────────────────────────────────
region:
  - PVT1_MYC: chr8:126445441-128594175

# ── Aligners ─────────────────────────────────────────────────────────
aligners:
  oracle: {}

# ── Rigel configs ─────────────────────────────────────────────────
rigel_configs:
  default: {}

# ── Simulation ───────────────────────────────────────────────────────
simulation:
  n_fragments: 200000
  sim_seed: 42
  pipeline_seed: 42
  frag_mean: 250.0
  frag_std: 50.0
  frag_min: 50
  frag_max: 1000
  read_length: 150
  error_rate: 0.0

# ── Abundance ────────────────────────────────────────────────────────
abundance:
  mode: random
  seed: 42
  min: 0.1
  max: 10000.0

# ── gDNA contamination ──────────────────────────────────────────────
gdna:
  rates: [0.0, 0.1, 0.25, 0.5]
  rate_labels: [none, low, moderate, high]
  frag_mean: 350.0
  frag_std: 100.0
  frag_min: 100
  frag_max: 1000

# ── Nascent RNA ──────────────────────────────────────────────────────
nrna:
  rates: [0.0, 0.1, 0.5]
  rate_labels: [none, low, high]

# ── Strand specificity ──────────────────────────────────────────────
strand_specificities: [1.0, 0.95, 0.75, 0.50]

# ── HTSeq ────────────────────────────────────────────────────────────
htseq:
  enabled: false

runtime:
  keep_going: true

verbose: true
