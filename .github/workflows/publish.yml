name: Build & Publish

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI (yes/no)"
        required: true
        default: "no"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Source distribution ──────────────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Binary wheels ───────────────────────────────────────────────────
  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            cibw_archs: x86_64
          # Linux aarch64 (emulated)
          - os: ubuntu-latest
            cibw_archs: aarch64
          # macOS arm64 — latest runner (macOS 15), brew targets 15.0
          - os: macos-latest
            cibw_archs: arm64
            macos_target: "15.0"

    steps:
      - uses: actions/checkout@v4

      # Emulation for Linux aarch64 builds
      - uses: docker/setup-qemu-action@v3
        if: matrix.cibw_archs == 'aarch64'
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          # Build for CPython 3.12+ only (stable ABI)
          CIBW_BUILD: "cp312-*"
          CIBW_SKIP: "*-musllinux_*"
          # Use manylinux_2_28 images: pyarrow 14+ only ships manylinux_2_28
          # binary wheels, so the manylinux2014 (glibc 2.17) container cannot
          # install pyarrow without building Arrow C++ from source. manylinux_2_28
          # (glibc 2.28) matches all modern distros (RHEL 8+, Ubuntu 20.04+).
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          # Install htslib inside the build container
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y autoconf automake bzip2-devel curl-devel
            libcurl-devel xz-devel zlib-devel &&
            cd /tmp &&
            curl -L https://github.com/samtools/htslib/releases/download/1.21/htslib-1.21.tar.bz2 | tar xj &&
            cd htslib-1.21 &&
            ./configure --prefix=/usr/local --enable-libcurl &&
            make -j$(nproc) && make install &&
            ldconfig
          CIBW_BEFORE_ALL_MACOS: >
            brew install htslib pkg-config
          # Set portable build flag (no -march=native) — Linux
          CIBW_ENVIRONMENT: >
            CMAKE_ARGS="-DRIGEL_PORTABLE=ON"
            PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          # macOS arm64: macos-latest = macOS 15, brew targets 15.0
          CIBW_ENVIRONMENT_MACOS: >
            CMAKE_ARGS="-DRIGEL_PORTABLE=ON"
            PKG_CONFIG_PATH="/opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
            MACOSX_DEPLOYMENT_TARGET="${{ matrix.macos_target }}"
          # Smoke test: install rigel wheel with all runtime deps and verify
          # all native extensions load. We only check that each module
          # imports (not specific symbol names), so routine refactors don't
          # break the release pipeline.
          CIBW_TEST_REQUIRES: >
            numpy>=1.26 pandas>=2.1 pyarrow>=14.0 pysam>=0.22 pyyaml>=6.0 scipy>=1.11
          CIBW_TEST_COMMAND: >-
            python -c "import importlib;
            mods = ['rigel._bam_impl', 'rigel._scoring_impl',
            'rigel._em_impl', 'rigel._resolve_impl'];
            [importlib.import_module(m) for m in mods];
            import rigel; print('OK', rigel.__version__)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_archs }}
          path: wheelhouse/*.whl

  # ── Publish to PyPI ─────────────────────────────────────────────────
  publish:
    needs: [sdist, wheels]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'yes')
    environment: pypi
    permissions:
      id-token: write  # trusted publisher (no API token needed)

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
