name: rigel
channels:
  - conda-forge
  - bioconda
dependencies:
  # - python>=3.13
  - pyyaml>=6.0
  - numpy>=2.4
  - pandas>=3.0
  - pyarrow>=23
  # bioconda dependencies
  - htslib>=1.23
  - pysam=0.23.2
  - samtools>=1.23
  - minimap2>=2.30
  - salmon
  - kallisto
  # Build dependencies for C/C++ extensions (nanobind)
  # - cmake>=3.15
  - scikit-build-core
  - nanobind>=2.1
  # Optional: 'alignable' powers --alignable-zarr at index time. It is
  # not yet on PyPI / bioconda; install from a local checkout when you
  # need real-data mappability:
  #     pip install -e /path/to/alignable
  # Without alignable installed, build indexes with --no-mappability.